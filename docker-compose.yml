services:
  mysql:
    image: mysql:8.0
    container_name: feineng-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: feineng_root_123
      MYSQL_DATABASE: feineng
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pfeineng_root_123"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
